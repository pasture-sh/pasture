name: Pasture
options:
  bundleIdPrefix: com.amrith
  deploymentTarget:
    iOS: "17.4"
    macOS: "14.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

packages:
  Loom:
    url: https://github.com/EthanLipnik/Loom
    exactVersion: 1.5.17
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0

targets:
  PastureShared:
    type: library.static
    platform: iOS
    sources:
      - Sources/PastureShared
    dependencies:
      - sdk: MultipeerConnectivity.framework
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: "YES"

  PastureSharedMac:
    type: library.static
    platform: macOS
    sources:
      - Sources/PastureShared
    dependencies:
      - sdk: MultipeerConnectivity.framework
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SKIP_INSTALL: "YES"
        PRODUCT_MODULE_NAME: PastureShared

  Pasture:
    type: application
    platform: iOS
    sources:
      - Sources/Pasture
    resources:
      - path: Sources/Pasture/Assets.xcassets
        optional: true
      - path: Sources/Pasture/Fonts
        buildPhase: resources
      - path: Sources/Pasture/PrivacyInfo.xcprivacy
    info:
      path: Sources/Pasture/Info.plist
      properties:
        CFBundleDisplayName: Pasture
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Pasture uses your local network to find and connect to your Mac running Ollama."
        NSBonjourServices:
          - _pasture._tcp
          - _pasture-mpc._tcp
        UIAppFonts:
          - Nunito-ExtraBold.ttf
          - Nunito-SemiBold.ttf
        PastureCloudKitContainerIdentifier: iCloud.com.amrith.pasture
    dependencies:
      - target: PastureShared
      - package: Loom
        product: Loom
      - package: Loom
        product: LoomKit
      - package: Loom
        product: LoomCloudKit
      - package: swift-markdown-ui
        product: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amrith.pasture
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Sources/Pasture/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Sources/Pasture/Pasture.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: VRNNS4H6XH

  PastureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PastureTests
    dependencies:
      - target: Pasture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amrith.pasture.tests
        SWIFT_VERSION: "6.0"

  PastureHelper:
    type: application
    platform: macOS
    sources:
      - Sources/PastureHelper
    resources:
      - path: Sources/PastureHelper/Assets.xcassets
        optional: true
      - path: Sources/PastureHelper/PrivacyInfo.xcprivacy
    info:
      path: Sources/PastureHelper/Info.plist
      properties:
        CFBundleDisplayName: Pasture for Mac
        LSUIElement: true
        NSLocalNetworkUsageDescription: "Pasture for Mac uses your local network to connect to Pasture for iOS."
        NSBonjourServices:
          - _pasture._tcp
          - _pasture-mpc._tcp
        PastureCloudKitContainerIdentifier: iCloud.com.amrith.pasture
    dependencies:
      - target: PastureSharedMac
      - package: Loom
        product: Loom
      - package: Loom
        product: LoomKit
      - package: Loom
        product: LoomCloudKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.amrith.pasture.helper
        SWIFT_VERSION: "6.0"
        INFOPLIST_FILE: Sources/PastureHelper/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/PastureHelper/PastureHelper.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: VRNNS4H6XH

schemes:
  Pasture:
    build:
      targets:
        Pasture: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PastureTests
    archive:
      config: Release
  PastureHelper:
    build:
      targets:
        PastureHelper: all
    run:
      config: Debug
    archive:
      config: Release
