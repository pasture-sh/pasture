name: Release macOS DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  release-macos:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          best_path=$(find /Applications -maxdepth 1 -name 'Xcode*.app' | sort -V | tail -1)
          sudo xcode-select -s "${best_path}/Contents/Developer"
          xcodebuild -version

      - name: Install dependencies
        run: |
          brew install xcodegen create-dmg
          xcodegen generate

      - name: Write ASC API Key
        run: echo "$FASTLANE_ASC_KEY_B64" | base64 --decode > /tmp/asc-key.p8
        env:
          FASTLANE_ASC_KEY_B64: ${{ secrets.FASTLANE_ASC_KEY_B64 }}

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_B64:      ${{ secrets.DEVELOPER_ID_P12_B64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          echo "$DEVELOPER_ID_P12_B64" | base64 --decode > /tmp/developer_id.p12
          security create-keychain -p "ci" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci" build.keychain
          security import /tmp/developer_id.p12 -k build.keychain -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" build.keychain
          security list-keychains -s build.keychain login.keychain

      - name: Download provisioning profile from ASC
        env:
          FASTLANE_ASC_KEY_ID:    ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
        run: |
          ruby - <<'RUBY'
          require 'openssl'; require 'base64'; require 'json'
          require 'net/http'; require 'uri'; require 'fileutils'

          key_id    = ENV['FASTLANE_ASC_KEY_ID']
          issuer_id = ENV['FASTLANE_ASC_ISSUER_ID']
          key       = OpenSSL::PKey::EC.new(File.read('/tmp/asc-key.p8'))
          now       = Time.now.to_i
          b64url    = ->(s) { Base64.urlsafe_encode64(s, padding: false) }
          hdr       = b64url.call({ alg: 'ES256', kid: key_id, typ: 'JWT' }.to_json)
          pay       = b64url.call({ iss: issuer_id, exp: now + 1200, aud: 'appstoreconnect-v1' }.to_json)
          sig_input = "#{hdr}.#{pay}"
          asn1_sig  = key.dsa_sign_asn1(OpenSSL::Digest::SHA256.digest(sig_input))
          seq       = OpenSSL::ASN1.decode(asn1_sig).value
          raw_sig   = [seq[0].value, seq[1].value].map { |n|
            n.to_s(2).bytes.drop_while { |b| b == 0 }.pack('C*').rjust(32, "\x00")
          }.join
          token = "#{sig_input}.#{b64url.call(raw_sig)}"

          uri = URI('https://api.appstoreconnect.apple.com/v1/profiles?filter[profileType]=MAC_APP_DIRECT&limit=50')
          req = Net::HTTP::Get.new(uri, 'Authorization' => "Bearer #{token}")
          res = Net::HTTP.start(uri.host, 443, use_ssl: true) { |h| h.request(req) }
          profiles = JSON.parse(res.body)['data'] || []
          profile  = profiles.find { |p| p['attributes']['bundleId']['id'] rescue
                       p['attributes']['name'].include?('pasture.helper') }
          abort "No Developer ID profile found for com.amrith.pasture.helper" unless profile

          content = Base64.decode64(profile['attributes']['profileContent'])
          uuid    = profile['attributes']['uuid']
          dir     = File.expand_path('~/Library/MobileDevice/Provisioning Profiles')
          FileUtils.mkdir_p(dir)
          path = "#{dir}/#{uuid}.provisionprofile"
          File.binwrite(path, content)
          File.write('/tmp/profile_name.txt', profile['attributes']['name'])
          puts "Installed profile: #{profile['attributes']['name']} (#{path})"
          RUBY

      - name: Build, notarize, and package DMG
        run: fastlane mac mac_dmg
        env:
          SKIP_MATCH:             "true"
          FASTLANE_ASC_KEY_ID:    ${{ secrets.FASTLANE_ASC_KEY_ID }}
          FASTLANE_ASC_ISSUER_ID: ${{ secrets.FASTLANE_ASC_ISSUER_ID }}
          FASTLANE_ASC_KEY_PATH:  /tmp/asc-key.p8

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "./build/macos/PastureHelper.dmg#Pasture for Mac.dmg" \
            --title "Pasture for Mac $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
