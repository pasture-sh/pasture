name: Check Loom Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  loom-upstream:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream Loom tag
        run: ./scripts/check_loom_upstream.sh --fail-if-outdated
